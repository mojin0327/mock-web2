services:
  - type: web
    name: mock-web2-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        value: app.db
      - key: FRONTEND_ORIGINS
        value: http://localhost:5173

